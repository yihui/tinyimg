name: R-CMD-check

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
  workflow_run:
    workflows: ["Cargo Update"]
    types: [completed]

jobs:
  prepare:
    if: github.event_name == 'workflow_run'
    runs-on: ubuntu-latest
    permissions:
      actions: read
    outputs:
      ref: ${{ steps.get-ref.outputs.ref }}
    steps:
      - name: Download PR branch artifact
        id: download
        uses: actions/download-artifact@v8
        with:
          name: pr-branch
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Get PR branch ref
        id: get-ref
        run: |
          if [ -f pr-branch.txt ]; then
            echo "ref=$(cat pr-branch.txt)" >> $GITHUB_OUTPUT
          else
            echo "ref=" >> $GITHUB_OUTPUT
          fi

  R-CMD-check:
    needs: [prepare]
    if: |
      always() &&
      (needs.prepare.result == 'skipped' || needs.prepare.result == 'success') &&
      (github.event_name != 'workflow_run' || needs.prepare.outputs.ref != '')
    runs-on: ${{ matrix.config.os }}
    permissions:
      contents: read

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: ubuntu-latest, r: 'release'}
          - {os: ubuntu-latest, r: 'devel', http-user-agent: 'release'}
          - {os: macos-latest, r: 'release'}
          - {os: windows-latest, r: 'release'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@HEAD
        with:
          ref: ${{ needs.prepare.outputs.ref || github.ref }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Vendor Rust dependencies
        run: |
          ./src/rust/update-vendor.sh
        shell: bash

      - name: Set up R ${{ matrix.config.r }}
        uses: r-lib/actions/setup-r@HEAD
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      - uses: yihui/actions/setup-r-dependencies@HEAD

      - uses: yihui/actions/check-r-package@HEAD
