name: CRAN PNG Savings

# Triggered manually or by itself when one or more worker jobs failed and some
# packages were not yet analyzed.  Not intended for push / PR runs because it
# is expensive (downloads every CRAN package tarball).
on:
  workflow_dispatch:

permissions:
  actions: write   # needed to trigger the next run and to delete the cache
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # 1. SETUP — query CRAN, load the cached results, compute the remaining
  #    package list, and emit a dynamic job matrix for the analyze step.
  # ---------------------------------------------------------------------------
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix:      ${{ steps.set-matrix.outputs.matrix }}
      has_work:    ${{ steps.set-matrix.outputs.has_work }}
      n_remaining: ${{ steps.set-matrix.outputs.n_remaining }}

    steps:
      - uses: actions/checkout@HEAD

      - name: Set up R
        uses: r-lib/actions/setup-r@HEAD

      - name: Install R packages
        uses: yihui/actions/setup-r-dependencies@HEAD
        with:
          extra-packages: xfun
          r-universe: yihui

      # Restore the accumulated results CSV from previous runs (if any).
      # Using the separate restore action so the later save step is never
      # skipped on a cache hit.
      - name: Restore cache
        uses: actions/cache/restore@v4
        with:
          path: ~/.cran-savings-cache
          key: cran-png-savings-v1

      - name: Determine remaining packages and set matrix
        id: set-matrix
        run: Rscript .github/workflows/cran-png-savings-setup.R
        env:
          CRAN_MIRROR: https://cloud.r-project.org
          CACHE_DIR: ~/.cran-savings-cache
          PKGS_PER_JOB: "1000"

      # Share the remaining-packages list with every worker job via an artifact
      # (retention 1 day is enough — workers run in the same workflow).
      - name: Upload remaining packages list
        uses: actions/upload-artifact@v4
        with:
          name: remaining-packages
          path: ~/.cran-savings-cache/remaining.csv
          retention-days: 1

  # ---------------------------------------------------------------------------
  # 2. ANALYZE — one job per matrix slice, each processing ~1000 packages.
  #    Individual failures are allowed; fail-fast is disabled so the collect
  #    step always sees the partial results.
  # ---------------------------------------------------------------------------
  analyze:
    needs: setup
    # Skip entirely when there is nothing left to do.  GitHub Actions errors
    # when a matrix expression resolves to an empty array, so the has_work
    # guard must be checked here before the matrix is evaluated.
    if: needs.setup.outputs.has_work == 'true'
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}

    steps:
      - uses: actions/checkout@HEAD

      - name: Set up R
        uses: r-lib/actions/setup-r@HEAD

      - name: Install R packages
        uses: yihui/actions/setup-r-dependencies@HEAD
        with:
          extra-packages: tinyimg xfun
          r-universe: cran yihui

      - name: Download remaining packages list
        uses: actions/download-artifact@v4.1.3
        with:
          name: remaining-packages
          path: ~/.cran-savings-cache

      - name: Run analysis
        run: Rscript .github/workflows/cran-png-savings-worker.R
        env:
          CRAN_MIRROR: https://cloud.r-project.org
          CACHE_DIR: ~/.cran-savings-cache
          JOB_INDEX: ${{ matrix.index }}
          PKGS_PER_JOB: "1000"

      # Upload even on failure so partial results are not lost.
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results-${{ matrix.index }}
          path: ~/.cran-savings-cache/results-${{ matrix.index }}.csv
          if-no-files-found: ignore
          retention-days: 7

  # ---------------------------------------------------------------------------
  # 3. COLLECT — always runs (even when some analyze jobs failed or were
  #    skipped).  Merges all per-job CSVs with the accumulated cache, saves
  #    the cache, and re-triggers the workflow if packages remain.
  # ---------------------------------------------------------------------------
  collect:
    needs: [setup, analyze]
    if: always() && needs.setup.result == 'success'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@HEAD

      - name: Set up R
        uses: r-lib/actions/setup-r@HEAD

      - name: Install R packages
        uses: yihui/actions/setup-r-dependencies@HEAD
        with:
          extra-packages: xfun
          r-universe: yihui

      # Restore the accumulated results CSV first so the collect script can
      # merge new artifacts on top of it.
      - name: Restore cache
        uses: actions/cache/restore@v4
        with:
          path: ~/.cran-savings-cache
          key: cran-png-savings-v1

      # Download all per-job result CSVs into a flat artifacts directory.
      # continue-on-error so the step does not fail when no analyze jobs ran.
      - name: Download result artifacts
        uses: actions/download-artifact@v4.1.3
        with:
          pattern: results-*
          path: ~/.cran-savings-cache/artifacts
          merge-multiple: true
        continue-on-error: true

      - name: Collect and summarise results
        id: collect
        run: Rscript .github/workflows/cran-png-savings-collect.R
        env:
          CRAN_MIRROR: https://cloud.r-project.org
          CACHE_DIR: ~/.cran-savings-cache
          ARTIFACTS_DIR: ~/.cran-savings-cache/artifacts

      # Upload the combined CSV as a workflow artifact for easy inspection.
      - name: Upload combined results
        uses: actions/upload-artifact@v4
        with:
          name: cran-png-savings-combined
          path: ~/.cran-savings-cache/results.csv
          if-no-files-found: ignore
          retention-days: 90

      # Delete the old cache entry so the save step can write under the same key.
      - name: Delete old cache
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          IDS=$(gh api \
            "repos/${{ github.repository }}/actions/caches?key=cran-png-savings-v1" \
            --jq '.actions_caches[].id' 2>/dev/null || true)
          for ID in $IDS; do
            echo "Deleting cache entry $ID ..."
            gh api -X DELETE \
              "repos/${{ github.repository }}/actions/caches/$ID" \
              2>/dev/null || true
          done

      - name: Save cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ~/.cran-savings-cache
          key: cran-png-savings-v1

      # If some packages were not analyzed (e.g. because jobs failed), kick off
      # the next run so it can cover the remaining packages.
      - name: Trigger next run
        id: trigger_next
        if: steps.collect.outputs.unfinished == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run cran-png-savings.yaml \
            --ref "${{ github.ref_name }}"
          echo "Next workflow run triggered."
        continue-on-error: true

      # Fail with a clear message when triggering the next run was not possible.
      - name: Fail if next run could not be triggered
        if: >-
          steps.collect.outputs.unfinished == 'true' &&
          steps.trigger_next.outcome == 'failure'
        run: |
          echo "::error::Some packages remain but could not trigger the next workflow run."
          echo "::error::Results are saved in cache. Re-run this workflow manually."
          exit 1
